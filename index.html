<!DOCTYPE html>
<html>
<head>
  <title>EOB PDF To Excel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>EOB PDF To Excel</h1>

  <p>
    Upload Healthcare EOB PDF and Download Excel
  </p>

  <input type="file"
         id="pdfFile"
         accept=".pdf">

  <button onclick="uploadPDF()">
    Convert To Excel
  </button>

  <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
